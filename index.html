<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tómbola Inteligente de Dominó 🀄 (Offline)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --retadores: #2980b9;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-add { background-color: var(--primary); color: white; }
        
        .btn-draw { 
            background-color: var(--accent); 
            color: white; 
            width: 100%; 
            font-size: 18px;
            margin-bottom: 20px;
        }

        .mesa-box {
            background-color: #e8f8f5;
            border: 2px dashed var(--accent);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            display: none;
        }
        .mesa-box h3 { margin-top: 0; color: #117a65; }
        
        .parejas-container {
            display: flex;
            justify-content: space-around;
            align-items: stretch;
            margin-top: 15px;
            gap: 10px;
        }
        .pareja {
            background: white;
            padding: 15px 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            min-width: 44%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .pareja h4 { margin: 0; color: var(--primary); }
        .vs { font-weight: bold; color: var(--danger); font-size: 18px; align-self: center; }

        .slot-jugador {
            background: #fdfefe;
            border: 1px solid #eaeded;
            padding: 8px;
            border-radius: 6px;
            font-size: 15px;
        }
        .btn-sub {
            background-color: var(--warning);
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            margin-top: 5px;
            border-radius: 4px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f2f2f2; color: var(--primary); }
        .badge {
            background-color: #e1f5fe;
            color: #0288d1;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-delete {
            background-color: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
        }
        .btn-reset {
            background-color: #7f8c8d;
            color: white;
            font-size: 12px;
            padding: 6px 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🀄 Tómbola de Dominó</h1>

    <div class="form-group">
        <input type="text" id="nombreJugador" placeholder="Nombre del jugador..." autocomplete="off">
        <button class="btn-add" onclick="agregarJugador()">Agregar</button>
    </div>

    <button id="btnSorteo" class="btn-draw" onclick="ejecutarSorteo()">🎲 INICIAR MESA (4 JUGADORES) 🎲</button>

    <div id="mesaBox" class="mesa-box">
        <h3 id="tituloMesa">¡Mesa Inicial Armada! 🎴</h3>
        <div class="parejas-container">
            <div class="pareja">
                <h4 id="tituloP1">Pareja 1 🔵</h4>
                <div id="slot0" class="slot-jugador"></div>
                <div id="slot1" class="slot-jugador"></div>
            </div>
            
            <div class="vs">VS</div>
            
            <div class="pareja">
                <h4 id="tituloP2">Pareja 2 🔴</h4>
                <div id="slot2" class="slot-jugador"></div>
                <div id="slot3" class="slot-jugador"></div>
            </div>
        </div>
        <button class="btn-reset" onclick="reiniciarFlujo()">Reiniciar a Mesa de 4</button>
    </div>

    <h3>Jugadores en Espera</h3>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Prioridad</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaEspera"></tbody>
    </table>
</div>

<script>
    // Estado de la tómbola
    let jugadores = JSON.parse(localStorage.getItem('domino_jugadores')) || {};
    let primeraRonda = JSON.parse(localStorage.getItem('domino_primeraRonda')) ?? true;
    let jugadoresMesaActual = JSON.parse(localStorage.getItem('domino_mesaActual')) || [];

    // Escuchar la tecla Enter
    document.getElementById('nombreJugador').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') agregarJugador();
    });

    function guardarEstado() {
        localStorage.setItem('domino_jugadores', JSON.stringify(jugadores));
        localStorage.setItem('domino_primeraRonda', JSON.stringify(primeraRonda));
        localStorage.setItem('domino_mesaActual', JSON.stringify(jugadoresMesaActual));
    }

    function actualizarTablaUI() {
        const tbody = document.getElementById('tablaEspera');
        tbody.innerHTML = '';

        const ordenados = Object.entries(jugadores).sort((a, b) => b[1] - a[1]);

        if (ordenados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">Tómbola vacía</td></tr>';
            return;
        }

        ordenados.forEach(([nombre, puntos]) => {
            const nivel = puntos === 1 ? 'Recién entrado' : `Espera Nivel ${puntos}`;
            tbody.innerHTML += `
                <tr>
                    <td><strong>${nombre}</strong></td>
                    <td><span class="badge">${nivel}</span></td>
                    <td><button class="btn-delete" onclick="eliminarJugador('${nombre}')">❌</button></td>
                </tr>
            `;
        });
    }

    function actualizarBotonesUI() {
        const btn = document.getElementById('btnSorteo');
        if (primeraRonda) {
            btn.innerText = "🎲 INICIAR MESA (4 JUGADORES) 🎲";
            btn.style.backgroundColor = "var(--accent)";
        } else {
            btn.innerText = "🎲 SACAR SIGUIENTE PAREJA (2 JUGADORES) 🎲";
            btn.style.backgroundColor = "var(--retadores)";
        }
    }

    function agregarJugador() {
        const input = document.getElementById('nombreJugador');
        const nombre = input.value.trim();

        if (!nombre) return alert('Por favor, escribe un nombre.');
        if (jugadores[nombre] || jugadoresMesaActual.includes(nombre)) {
            return alert('Este jugador ya está registrado (en espera o jugando).');
        }

        jugadores[nombre] = 1;
        input.value = '';
        guardarEstado();
        actualizarTablaUI();
    }

    function eliminarJugador(nombre) {
        if (confirm(`¿Seguro que quieres eliminar a ${nombre} de la tómbola?`)) {
            delete jugadores[nombre];
            guardarEstado();
            actualizarTablaUI();
        }
    }

    // Algoritmo de selección inteligente basada en pesos
    function extraerUnJugador() {
        const nombres = Object.keys(jugadores);
        if (nombres.length === 0) return null;

        const pesos = Object.values(jugadores);
        const totalPeso = pesos.reduce((a, b) => a + b, 0);
        const r = Math.random() * totalPeso;
        let suma = 0;

        for (let i = 0; i < nombres.length; i++) {
            suma += pesos[i];
            if (r <= suma) {
                const elegido = nombres[i];
                delete jugadores[elegido]; // Se saca de la tómbola
                return elegido;
            }
        }
        return nombres[0];
    }

    function ejecutarSorteo() {
        const cantidadNecesaria = primeraRonda ? 4 : 2;
        if (Object.keys(jugadores).length < cantidadNecesaria) {
            return alert(`Faltan jugadores. Se necesitan mínimo ${cantidadNecesaria} en la tómbola.`);
        }

        // Incrementar la prioridad (+2) a los que se queden en la tómbola esperando
        for (let j in jugadores) {
            jugadores[j] += 2;
        }

        if (primeraRonda) {
            jugadoresMesaActual = [];
            for (let i = 0; i < 4; i++) {
                jugadoresMesaActual.push(extraerUnJugador());
            }
            // Mezclar posiciones iniciales
            jugadoresMesaActual.sort(() => Math.random() - 0.5);
            primeraRonda = false;
        } else {
            // El formato de retadores: los slots 0 y 1 (ganadores) se quedan quietos
            // Sacamos 2 nuevos para los slots 2 y 3
            jugadoresMesaActual[2] = extraerUnJugador();
            jugadoresMesaActual[3] = extraerUnJugador();
        }

        guardarEstado();
        renderizarMesa();
        actualizarTablaUI();
        actualizarBotonesUI();
    }

    function renderizarMesa() {
        if (jugadoresMesaActual.length === 0) {
            document.getElementById('mesaBox').style.display = 'none';
            return;
        }

        const mesaBox = document.getElementById('mesaBox');
        
        if (!primeraRonda && (jugadoresMesaActual[0] === "---" || jugadoresMesaActual[1] === "---")) {
            document.getElementById('tituloMesa').innerText = "¡Nuevos Retadores Listos! ⚔️";
            document.getElementById('tituloP1').innerText = "Mesa (Esperando Ganador)";
            document.getElementById('tituloP2').innerText = "Nuevos Retadores 🚀";
        } else {
            document.getElementById('tituloMesa').innerText = "¡Mesa Activa! 🎴";
            document.getElementById('tituloP1').innerText = "Pareja 1 🔵";
            document.getElementById('tituloP2').innerText = "Pareja 2 🔴";
        }

        // Mostrar nombres y botones de sustitución rápida
        for (let i = 0; i < 4; i++) {
            const nombre = jugadoresMesaActual[i] || "---";
            let htmlContent = `<strong>${nombre}</strong>`;
            
            // Permitir cambiar jugador si hay alguien jugando ahí
            if (nombre !== "---") {
                htmlContent += `<br><button class="btn-sub" onclick="reemplazarJugadorMesa(${i})">🔄 Cambiar</button>`;
            }
            document.getElementById(`slot${i}`).innerHTML = htmlContent;
        }

        mesaBox.style.display = 'block';
    }

    function reemplazarJugadorMesa(indexSlot) {
        if (Object.keys(jugadores).length === 0) {
            return alert("No hay más jugadores disponibles en la tómbola para hacer el cambio.");
        }

        const jugadorSaliente = jugadoresMesaActual[indexSlot];
        
        // 1. Extraer al nuevo retador de la tómbola
        const nuevoJugador = extraerUnJugador();
        
        // 2. Regresar al jugador saliente a la tómbola con prioridad base 1
        if (jugadorSaliente && jugadorSaliente !== "---") {
            jugadores[jugadorSaliente] = 1;
        }

        // 3. Sentar al nuevo en el slot asignado
        jugadoresMesaActual[indexSlot] = nuevoJugador;

        guardarEstado();
        renderizarMesa();
        actualizarTablaUI();
    }

    function reiniciarFlujo() {
        // Al reiniciar, devolvemos a los jugadores de la mesa a la tómbola
        jugadoresMesaActual.forEach(j => {
            if (j && j !== "---") jugadores[j] = 1;
        });
        jugadoresMesaActual = [];
        primeraRonda = true;
        
        guardarEstado();
        renderizarMesa();
        actualizarTablaUI();
        actualizarBotonesUI();
    }

    // Inicializar la interfaz con lo guardado
    actualizarTablaUI();
    actualizarBotonesUI();
    if (jugadoresMesaActual.length > 0) {
        renderizarMesa();
    }
</script>

</body>
</html>
