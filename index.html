<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tómbola de Dominó Profesional 🀄</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --retadores: #2980b9;
            --danger: #e74c3c;
            --warning: #f39c12;
            --purple: #8e44ad;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-add { background-color: var(--primary); color: white; }
        
        .btn-draw { 
            background-color: var(--accent); 
            color: white; 
            width: 100%; 
            font-size: 18px;
            margin-bottom: 20px;
        }

        .panel-opciones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .btn-opcion-1 { background-color: var(--retadores); color: white; }
        .btn-opcion-2 { background-color: var(--purple); color: white; }

        .mesas-contenedor {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mesa-box {
            background-color: #e8f8f5;
            border: 2px dashed var(--accent);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            position: relative;
        }
        .mesa-box.mesa2 {
            background-color: #f5eef8;
            border-color: var(--purple);
        }
        .mesa-box h3 { margin-top: 0; color: #117a65; }
        .mesa-box.mesa2 h3 { color: #6c3483; }
        
        .parejas-container {
            display: flex;
            justify-content: space-around;
            align-items: stretch;
            margin-top: 15px;
            gap: 10px;
        }
        .pareja {
            background: white;
            padding: 15px 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            min-width: 44%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .pareja.oculta {
            background: rgba(240, 240, 240, 0.5);
            border: 1px dashed #ccc;
            box-shadow: none;
        }
        .pareja h4 { margin: 0; color: var(--primary); }
        .vs { font-weight: bold; color: var(--danger); font-size: 18px; align-self: center; }

        .slot-jugador {
            background: #fdfefe;
            border: 1px solid #eaeded;
            padding: 8px;
            border-radius: 6px;
            font-size: 15px;
        }
        .pareja.oculta .slot-jugador {
            background: transparent;
            border: none;
            color: #999;
            font-style: italic;
        }
        .btn-sub {
            background-color: var(--warning);
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            margin-top: 5px;
            border-radius: 4px;
            width: 100%;
        }

        .btn-cerrar-mesa {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            padding: 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f2f2f2; color: var(--primary); }
        .badge {
            background-color: #e1f5fe;
            color: #0288d1;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-delete {
            background-color: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🀄 Tómbola de Dominó</h1>

    <!-- Formulario Agregar -->
    <div class="form-group">
        <input type="text" id="nombreJugador" placeholder="Nombre del jugador..." autocomplete="off">
        <button class="btn-add" onclick="agregarJugador()">Agregar</button>
    </div>

    <!-- Botón Inicial Único -->
    <button id="btnSorteoInicial" class="btn-draw" onclick="iniciarPrimeraMesa()">🎲 ABRIR MESA PRINCIPAL (4 JUGADORES) 🎲</button>

    <!-- Panel Dinámico de Opciones Posteriores -->
    <div id="panelOpciones" class="panel-opciones">
        <button class="btn-opcion-1" onclick="sacarDosRetadores()">⚔️ Elegir Siguiente Pareja (2 Retadores)</button>
        <button class="btn-opcion-2" onclick="abrirMesaNueva()">➕ Abrir Mesa Nueva (2 Parejas / 4 Jugadores)</button>
    </div>

    <!-- Área de visualización de Mesas -->
    <div class="mesas-contenedor">
        <!-- Mesa 1 -->
        <div id="mesa1Box" class="mesa-box" style="display: none;">
            <button class="btn-cerrar-mesa" onclick="cerrarMesa(1)">X</button>
            <h3 id="tituloMesa1">Mesa Principal 🎴</h3>
            <div class="parejas-container">
                <div id="m1-blockP1" class="pareja">
                    <h4>Pareja 1 🔵</h4>
                    <div id="m1-slot0" class="slot-jugador"></div>
                    <div id="m1-slot1" class="slot-jugador"></div>
                </div>
                <div id="m1-vs" class="vs">VS</div>
                <div id="m1-blockP2" class="pareja">
                    <h4>Pareja 2 🔴</h4>
                    <div id="m1-slot2" class="slot-jugador"></div>
                    <div id="m1-slot3" class="slot-jugador"></div>
                </div>
            </div>
        </div>

        <!-- Mesa 2 -->
        <div id="mesa2Box" class="mesa-box mesa2" style="display: none;">
            <button class="btn-cerrar-mesa" onclick="cerrarMesa(2)">X</button>
            <h3>Mesa Secundaria 🌟</h3>
            <div class="parejas-container">
                <div class="pareja">
                    <h4>Pareja 1 🔵</h4>
                    <div id="m2-slot0" class="slot-jugador"></div>
                    <div id="m2-slot1" class="slot-jugador"></div>
                </div>
                <div class="vs">VS</div>
                <div class="pareja">
                    <h4>Pareja 2 🔴</h4>
                    <div id="m2-slot2" class="slot-jugador"></div>
                    <div id="m2-slot3" class="slot-jugador"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabla de posiciones/espera -->
    <h3>Jugadores en Espera</h3>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Prioridad</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaEspera"></tbody>
    </table>
</div>

<script>
    let jugadores = {};
    let mesa1 = [];
    let mesa2 = [];
    let mostrandoSoloRetadores = false; // Controla el estado visual de la mesa 1

    document.getElementById('nombreJugador').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') agregarJugador();
    });

    function actualizarTablaUI() {
        const tbody = document.getElementById('tablaEspera');
        tbody.innerHTML = '';
        const ordenados = Object.entries(jugadores).sort((a, b) => b[1] - a[1]);

        if (ordenados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">Tómbola vacía</td></tr>';
            return;
        }

        ordenados.forEach(([nombre, puntos]) => {
            const nivel = puntos === 1 ? 'Recién entrado' : `Espera Nivel ${puntos}`;
            tbody.innerHTML += `
                <tr>
                    <td><strong>${nombre}</strong></td>
                    <td><span class="badge">${nivel}</span></td>
                    <td><button class="btn-delete" onclick="eliminarJugador('${nombre}')">❌</button></td>
                </tr>
            `;
        });
    }

    function agregarJugador() {
        const input = document.getElementById('nombreJugador');
        const nombre = input.value.trim();

        if (!nombre) return alert('Por favor, escribe un nombre.');
        if (jugadores[nombre] || mesa1.includes(nombre) || mesa2.includes(nombre)) {
            return alert('Este jugador ya está registrado.');
        }

        jugadores[nombre] = 1;
        input.value = '';
        actualizarTablaUI();
    }

    function eliminarJugador(nombre) {
        if (confirm(`¿Eliminar a ${nombre}?`)) {
            delete jugadores[nombre];
            actualizarTablaUI();
        }
    }

    function extraerUnJugador() {
        const nombres = Object.keys(jugadores);
        if (nombres.length === 0) return null;

        const pesos = Object.values(jugadores);
        const totalPeso = pesos.reduce((a, b) => a + b, 0);
        const r = Math.random() * totalPeso;
        let suma = 0;

        for (let i = 0; i < nombres.length; i++) {
            suma += pesos[i];
            if (r <= suma) {
                const elegido = nombres[i];
                delete jugadores[elegido];
                return elegido;
            }
        }
        return nombres[0];
    }

    function envejecerEspera() {
        for (let j in jugadores) {
            jugadores[j] += 2;
        }
    }

    // ACCION: Iniciar por primera vez la Mesa 1 (4 Jugadores completos)
    function iniciarPrimeraMesa() {
        if (Object.keys(jugadores).length < 4) return alert("Se necesitan mínimo 4 jugadores.");
        
        mostrandoSoloRetadores = false;
        mesa1 = [extraerUnJugador(), extraerUnJugador(), extraerUnJugador(), extraerUnJugador()];
        mesa1.sort(() => Math.random() - 0.5);

        document.getElementById('btnSorteoInicial').style.display = 'none';
        document.getElementById('panelOpciones').style.display = 'grid';

        renderizarMesaUI(1);
        actualizarTablaUI();
    }

    // ACCION: Elegir pareja (Sacar 2 retadores y limpiar la pareja anterior en pantalla)
    function sacarDosRetadores() {
        if (Object.keys(jugadores).length < 2) return alert("Faltan jugadores. Necesitas mínimo 2 en espera.");

        envejecerEspera();
        
        // Si la pareja anterior estaba jugando en mesa1 (slots 0 y 1), los devolvemos a la tómbola para que roten limpios
        if (mesa1[0] && mesa1[0] !== "---") jugadores[mesa1[0]] = 1;
        if (mesa1[1] && mesa1[1] !== "---") jugadores[mesa1[1]] = 1;

        // Limpiamos la pareja 1 vieja de la memoria
        mesa1[0] = "---";
        mesa1[1] = "---";

        // Sorteamos la nueva pareja elegida en los slots de la derecha
        mesa1[2] = extraerUnJugador();
        mesa1[3] = extraerUnJugador();

        mostrandoSoloRetadores = true;

        renderizarMesaUI(1);
        actualizarTablaUI();
    }

    // ACCION: Abrir una mesa completamente nueva (4 jugadores)
    function abrirMesaNueva() {
        if (Object.keys(jugadores).length < 4) return alert("Faltan jugadores. Necesitas mínimo 4 para armar otra mesa completa.");

        envejecerEspera();
        mesa2 = [extraerUnJugador(), extraerUnJugador(), extraerUnJugador(), extraerUnJugador()];
        mesa2.sort(() => Math.random() - 0.5);

        renderizarMesaUI(2);
        actualizarTablaUI();
    }

    function renderizarMesaUI(numMesa) {
        if (numMesa === 1) {
            const blockP1 = document.getElementById('m1-blockP1');
            const blockP2 = document.getElementById('m1-blockP2');
            const vsDiv = document.getElementById('m1-vs');
            const titulo = document.getElementById('tituloMesa1');

            if (mostrandoSoloRetadores) {
                // Modificar estructura visual para enfocar solo la pareja elegida
                titulo.innerText = "¡Siguiente Pareja Elegida! 🚀";
                blockP1.className = "pareja oculta";
                blockP1.querySelector('h4').innerText = "Mesa Anterior 🔵";
                document.getElementById('m1-slot0').innerHTML = "Rotando...";
                document.getElementById('m1-slot1').innerHTML = "Rotando...";
                
                blockP2.className = "pareja";
                blockP2.querySelector('h4').innerText = "Nuevos Retadores 🔴";
                
                for (let i = 2; i < 4; i++) {
                    const nombre = mesa1[i];
                    document.getElementById(`m1-slot${i}`).innerHTML = `
                        <strong>${nombre}</strong><br>
                        <button class="btn-sub" onclick="sustituirIndividual(1, ${i})">🔄 Cambiar</button>
                    `;
                }
            } else {
                // Formato normal de 4 jugadores activos cara a cara
                titulo.innerText = "Mesa Principal 🎴";
                blockP1.className = "pareja";
                blockP1.querySelector('h4').innerText = "Pareja 1 🔵";
                blockP2.className = "pareja";
                blockP2.querySelector('h4').innerText = "Pareja 2 🔴";

                for (let i = 0; i < 4; i++) {
                    const nombre = mesa1[i];
                    document.getElementById(`m1-slot${i}`).innerHTML = `
                        <strong>${nombre}</strong><br>
                        <button class="btn-sub" onclick="sustituirIndividual(1, ${i})">🔄 Cambiar</button>
                    `;
                }
            }
            document.getElementById('mesa1Box').style.display = 'block';
        } else {
            // Render de Mesa 2 estándar (Siempre 4 personas)
            for (let i = 0; i < 4; i++) {
                const nombre = mesa2[i];
                document.getElementById(`m2-slot${i}`).innerHTML = `
                    <strong>${nombre}</strong><br>
                    <button class="btn-sub" onclick="sustituirIndividual(2, ${i})">🔄 Cambiar</button>
                `;
            }
            document.getElementById('mesa2Box').style.display = 'block';
        }
    }

    function sustituirIndividual(numMesa, slotIndex) {
        if (Object.keys(jugadores).length === 0) return alert("No hay nadie más en la tómbola.");

        const lista = numMesa === 1 ? mesa1 : mesa2;
        const saliente = lista[slotIndex];
        const nuevo = extraerUnJugador();

        if (saliente && saliente !== "---") jugadores[saliente] = 1;
        lista[slotIndex] = nuevo;

        renderizarMesaUI(numMesa);
        actualizarTablaUI();
    }

    function cerrarMesa(numMesa) {
        const lista = numMesa === 1 ? mesa1 : mesa2;
        
        lista.forEach(j => {
            if (j && j !== "---") jugadores[j] = 1;
        });

        if (numMesa === 1) { mesa1 = []; mostrandoSoloRetadores = false; }
        else { mesa2 = []; }

        document.getElementById(`mesa${numMesa}Box`).style.display = 'none';
        
        if (mesa1.length === 0 && mesa2.length === 0) {
            document.getElementById('btnSorteoInicial').style.display = 'block';
            document.getElementById('panelOpciones').style.display = 'none';
        }

        actualizarTablaUI();
    }
</script>

</body>
</html>
